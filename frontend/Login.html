<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/Login.css">
    <title>Document</title>
</head>
<body>
    
    <nav class="navbar navbar-expand-md navbar-dark">

        <div class="container-fluid px-4">
            <a href="" class="navbar-brand"></a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="#">Servicios</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Productos</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Carrito</a></li>
                    <li class="nav-item"><a class="nav-link active" href="Login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-5 col-lg-4">

            <div class="card shadow border-0 rounded-4">
                <div class="card-body p-4 text-center">

                    <h5 class="fw-bold mb-3">Iniciar Sesión</h5>

                    <form>

                        <div class="mb-3 text-start">
                            <label class="form-label fw-semibold">Correo electrónico</label>

                            <input type="email"
                                class="form-control"
                                placeholder="ejemplo@gmail.com">

                        </div>

                        <div class="mb-3 text-start">
                            <label class="form-label fw-semibold">Contraseña</label>

                            <input type="password"
                                class="form-control"
                                placeholder="********">
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100 rounded-pill mb-2"><a href="principal.html"></a>
                            Iniciar Sesión
                        </button>

                        <p class="small mb-1">
                            ¿No tienes cuenta?
                            <a href="Registro.html" class="text-primary fw-semibold">Regístrate</a>
                        </p>

                        <a href="recuperarPassword.html" class="small text-decoration-none text-muted">
                            Olvidé mi contraseña
                        </a>

                    </form>

                </div>
            </div>

        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/Login.js"></script>

</body>
</html>
